workflows:
  ios-workflow:
    name: Mahjong Garden Party - iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: "Codemagic CI"  # still used for UPLOADING to TestFlight/App Store, not for signing
    environment:
      vars:
        XCODE_PROJECT: "ios/MahjongGardenParty.xcodeproj"
        XCODE_SCHEME: "MahjongGardenParty"
        APP_STORE_APPLE_ID: 6793677304
        BUNDLE_ID: "com.mahjonggardenparty"
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Set up manual code signing
        script: |
          # Pulls the certificate + provisioning profile you uploaded to Codemagic
          # and applies them to the Xcode project (manual signing).
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles \
            --export-options-plist "$HOME/export_options.plist"

      - name: Resolve Swift Package dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"

      - name: Increment build number
        script: |
          cd $(dirname "$XCODE_PROJECT")
          agvtool new-version -all $(($(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID") + 1))

      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist "$HOME/export_options.plist"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
