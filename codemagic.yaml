workflows:
  ios-workflow:
    name: Mahjong Garden Party - iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: "Codemagic CI"   # used for uploading to TestFlight
    environment:
      ios_signing:
        # Reference names as shown in Codemagic > Settings > Code signing identities
        provisioning_profiles:
          - Mahjong Garden
        certificates:
          - Codemagic Distribution
      vars:
        XCODE_PROJECT: "ios/MahjongGardenParty.xcodeproj"
        XCODE_SCHEME: "MahjongGardenParty"
        APP_STORE_APPLE_ID: 6793677304
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Apply uploaded signing files to the Xcode project
        script: |
          xcode-project use-profiles

      - name: Resolve Swift Package dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"

      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
